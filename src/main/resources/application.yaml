# ===========================================
# 3D打印农场管理系统 - 基础配置
# ===========================================

spring:
  profiles:
    active: dev  # 默认激活开发环境

  application:
    name: 3d-printer-farm

  output:
    ansi:
      enabled: ALWAYS

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB      # 单个文件最大限制 (给 G-code 放宽到 200MB)
      max-request-size: 250MB
      file-size-threshold: 10MB
      resolve-lazily: true

  # 数据源基础配置（环境特定配置会覆盖详细参数）
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis基础配置（环境特定配置会覆盖详细参数）
  data:
    redis:
      timeout: 5s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 5s
        shutdown-timeout: 2s

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    # 开启驼峰命名自动映射 (例如 db 中的 created_at 会自动映射到 Java 的 createdAt)
    map-underscore-to-camel-case: true
    # 走 slf4j 统一收敛，不使用 stdout 直出
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.farm.entity

# JWT配置
jwt:
  # JWT 密钥（生产环境请使用复杂随机字符串，并通过环境变量注入）
  secret-key: ${JWT_SECRET_KEY:Farm3DPrinterSuperSecretKey}
  # Token 有效期：7天（单位：毫秒）
  expire-time: 604800000

# 管理员配置
admin:
  # 管理员操作密钥（用于密码批量迁移等敏感操作）
  # 生产环境请通过环境变量注入复杂随机字符串
  secret-key: ${ADMIN_SECRET_KEY:FarmAdmin2024}

# RustFS基础配置（环境特定配置会覆盖）
rustfs:
  bucket: farm

# 日志基础配置
logging:
  config: classpath:logback-spring.xml
  file:
    path: ./logs
  level:
    root: INFO
    com.example.farm: INFO
    org.springframework: WARN
    org.springframework.web: WARN
    org.apache.ibatis: WARN

# 服务器基础配置
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 10000
    accept-count: 100
    connection-timeout: 20000

# 应用自定义配置
farm:
  websocket:
    max-connections: 1000
  # Moonraker API 模拟器配置（切片软件连接密钥）
  moonraker-api-key: ${MOONRAKER_API_KEY:}
